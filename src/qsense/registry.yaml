- id: Kimi-K2.5
  name: Kimi K2.5
  vision: true
  audio: false
  video: true                  # 实验性支持
  native_video: true           # 原生视频理解（实验性）
  context_tokens: 262144       # 256K
  max_image_size_mb: 100       # 受请求体 100MB 限制
  max_image_resolution: 4096x2160  # 4K
  max_images_per_request: null  # 无硬限制，受请求体大小约束
  max_audio_duration_min: 0
  max_video_duration_min: null  # 未公开具体上限
  image_formats: [jpeg, png, webp, gif]
  audio_formats: []
  video_formats: [mp4, mpeg, mov, avi, webm, wmv, 3gpp]
  description: Moonshot 多模态模型，256K 上下文，支持 4K 图像和视频理解（实验性）
