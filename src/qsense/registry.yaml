# ──────────────────────────────────────────────
# Gemini
# ──────────────────────────────────────────────
- id: google/gemini-3-flash-preview
  name: Gemini 3 Flash
  vision: true
  audio: true
  video: true
  native_video: true          # 1FPS 抽帧 + 音轨，非真原生流式
  context_tokens: 1048576     # 1M
  max_image_size_mb: 7        # inline; Cloud Storage 30MB
  max_image_resolution: null   # 无固定上限，按 token 预算分 tile
  max_images_per_request: 3000
  max_audio_duration_min: 504  # ~8.4 小时
  max_video_duration_min: 45   # 带音轨; 无音轨 ~60min; 低分辨率 ~3h
  image_formats: [jpeg, png, webp, heic, heif]
  audio_formats: [mp3, wav, flac, ogg, aac, m4a, webm]
  video_formats: [mp4, mpeg, mov, avi, webm, wmv, 3gpp]
  description: 快速多模态模型，适合日常图像/音频/视频理解

- id: google/gemini-3.1-pro-preview
  name: Gemini 3.1 Pro
  vision: true
  audio: true
  video: true
  native_video: true
  context_tokens: 1048576
  max_image_size_mb: 7
  max_image_resolution: null
  max_images_per_request: 3000
  max_audio_duration_min: 504
  max_video_duration_min: 45
  image_formats: [jpeg, png, webp, heic, heif]
  audio_formats: [mp3, wav, flac, ogg, aac, m4a, webm]
  video_formats: [mp4, mpeg, mov, avi, webm, wmv, 3gpp]
  description: 高质量多模态模型，适合复杂分析任务

- id: gemma-4-31B-it
  name: Gemma 4 31B IT
  vision: true
  audio: false                 # 31B 不支持音频，仅 E2B/E4B 支持
  video: true                  # 仅通过抽帧，~60s
  native_video: false
  context_tokens: 262144       # 256K
  max_image_size_mb: null      # 取决于部署平台
  max_image_resolution: null   # 可变分辨率，按 token 预算
  max_images_per_request: null
  max_audio_duration_min: 0
  max_video_duration_min: 1    # ~60 秒，1FPS 抽帧
  image_formats: [jpeg, png, webp]
  audio_formats: []
  video_formats: [mp4, webm]
  description: 开源视觉语言模型，256K 上下文，仅支持图像和短视频抽帧

